<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "微软雅黑", Arial, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #dd6090, #23a6d5, #301ba8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .pdf-container {
            width: 40.0%;
            height: 100vh;
            border: none;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            background: white;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .pdf-container iframe::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .back-link {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .back-link a {
            display: inline-block;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .back-link a:hover {
            background: rgba(255, 255, 255, 1);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="pdf-container">
        <iframe src="resume.pdf" type="application/pdf">
            <p>your browser does not support pdf, please<a href="resume.pdf" target="_blank">look at here</a>cv.</p>
        </iframe>
    </div>

    <div class="back-link">
        <a href="index.html">← back</a>
    </div>
</body>
</html>
