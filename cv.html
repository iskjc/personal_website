<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Vitae</title>

    <style>
        /* ===== 颜色变量 ===== */
        :root {
            --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            --container-bg: #ffffff;
            --header-text: #2c2c2c;
            --button-bg: #4f6fad;
            --cv-bg: #f3f3f3;
        }

        /* ===== 深色模式变量 ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                /* 关键：增加深色模式的颜色跨度，防止看起来是纯黑 */
                --bg-gradient: linear-gradient(-45deg, #2d8aff, #3a2f8f, #fb068e, #25ba54);
                --container-bg: #1e1e1e;
                --header-text: #e5e5e5;
                --button-bg: #5a7ec7;
                --cv-bg: #111111;
            }
        }

        /* ===== 动态全屏背景 ===== */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 允许长内容滚动 */
            padding: 60px 0;
            overflow-x: hidden;
        }

        /* 使用伪元素承载背景，解决动画偏移问题 */
        body::before {
            content: "";
            position: fixed; /* 固定在视口，不随滚动条移动 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 置于底层 */
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== 容器样式 ===== */
        .container {
            position: relative;
            width: 70%;
            max-width: 1100px;
            background: var(--container-bg);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            z-index: 1;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .title {
            font-size: 20px;
            font-weight: 600;
            color: var(--header-text);
        }

        .buttons {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 20px;
            background: var(--button-bg);
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.25s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
        }

        /* ===== CV 展示区域 ===== */
        .cv-view {
            background: var(--cv-bg);
            display: flex;
            justify-content: center;
            padding: 60px 0;
        }

        .cv-view img {
            width: 900px;
            max-width: 90%;
            height: auto;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            border-radius: 4px;
        }

        /* 深色模式下的图片微调 */
        @media (prefers-color-scheme: dark) {
            .cv-view img {
                filter: brightness(0.85) contrast(1.1);
            }
        }

        /* ===== 手机适配 ===== */
        @media (max-width: 800px) {
            .container {
                width: 92%;
            }
            .cv-view {
                padding: 30px 0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title">Curriculum Vitae</div>
        <div class="buttons">
            <a class="btn" href="resume.pdf" target="_blank">Download PDF</a>
            <a class="btn" href="index.html">Back</a>
        </div>
    </div>

    <div class="cv-view">
        <img src="resume-1.png" alt="CV">
    </div>
</div>

</body>
</html>
